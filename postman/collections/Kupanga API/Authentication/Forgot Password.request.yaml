$kind: http-request
description: Request a password reset link. An email with reset token will be
  sent to the provided email address.
url: "{{baseUrl}}/auth/forgot-password?email=user@example.com"
method: POST
headers:
  Content-Type: application/json
queryParams:
  - key: email
    value: user@example.com
    description: Email address of the user requesting password reset
order: 5000

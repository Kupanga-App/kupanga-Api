$kind: http-request
description: Reset password using the token received via email. Token is valid
  for 10 minutes.
url: "{{baseUrl}}/auth/reset-password?token=reset-token-here&newPassword=NewPas\
  sword123"
method: POST
headers:
  Content-Type: application/json
queryParams:
  - key: token
    value: reset-token-here
    description: Password reset token received via email
  - key: newPassword
    value: NewPassword123
    description: New password (min 8 chars, 1 uppercase, 1 lowercase, 1 digit)
order: 6000

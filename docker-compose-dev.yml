
services:

  # ------------------------
  # 1️. Spring Boot App
  # ------------------------
  kupanga:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: panga-dev
    ports:
      - "8085:8080"
    env_file:
      - .env.dev
    depends_on:
      - db
      - minio
      - redis
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ------------------------
  # 2. PostgreSQL Database
  # ------------------------
  db:
    image: postgis/postgis:15-3.4-alpine
    container_name: kupanga-db-dev
    environment:
      POSTGRES_DB: kupanga_dev
      POSTGRES_USER: kupanga
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5433:5432"
    volumes:
      - db-data-dev:/var/lib/postgresql/data
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ------------------------
  # 3️. MinIO Storage
  # ------------------------
  minio:
    image: minio/minio:latest
    container_name: minio-dev
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio-data-dev:/data
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ------------------------
  # 4. Redis Cache
  # ------------------------
  redis:
    image: redis:7-alpine
    container_name: redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis-data-dev:/data
    restart: always
    command: redis-server --appendonly yes
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
  # ------------------------
  # 5️. RedisInsight GUI
  # ------------------------
  redisinsight:
    image: redislabs/redisinsight:latest
    container_name: redisinsight-dev
    ports:
      - "8001:8001"       # accès web RedisInsight
    restart: always
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M


# ------------------------
# Volumes persistants
# ------------------------
volumes:
  db-data-dev:
  minio-data-dev:
  redis-data-dev:

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>

        body {
            font-family: Arial, sans-serif;
            font-size: 12px;
            color: #1a1a2e;
            margin: 30px;
        }

        /* Layout principal */
        .container {
            border: 2px solid #1a3a6b;
            padding: 20px;
        }

        /* Top boxes */
        .top {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .box {
            border: 1px solid #1a3a6b;
            padding: 10px;
            width: 45%;
            font-size: 11px;
        }

        /* Titre centré */
        .title {
            text-align: center;
            margin: 20px 0;
        }

        .title h1 {
            font-size: 20px;
            color: #1a3a6b;
        }

        .title h2 {
            font-size: 14px;
            margin-top: 5px;
        }

        /* Bloc principal */
        .content {
            border: 1px solid #c5d3e8;
            padding: 15px;
        }

        /* Texte */
        .line {
            margin-bottom: 8px;
        }

        .bold {
            font-weight: bold;
        }

        .blue {
            color: #1a6fbf;
            font-weight: bold;
        }

        /* Détail */
        .detail {
            margin-top: 15px;
            font-size: 11px;
        }

        /* Signature */
        .signature {
            margin-top: 20px;
            text-align: right;
        }

        /* Footer */
        .footer {
            margin-top: 20px;
            font-size: 10px;
            color: #666;
        }

    </style>
</head>

<body>

<div class="container">

    <!-- Top -->
    <div class="top">
        <div class="box">
            <div class="bold">Bailleur</div>
            <div th:text="${proprietaire.firstName + ' ' + proprietaire.lastName}"></div>
            <div th:text="${proprietaire.mail}"></div>
        </div>

        <div class="box">
            <div class="bold">Locataire</div>
            <div th:text="${locataire.firstName + ' ' + locataire.lastName}"></div>
            <div th:text="${locataire.mail}"></div>
        </div>
    </div>

    <!-- Titre -->
    <div class="title">
        <h1>Quittance de loyer</h1>
        <h2 th:text="'Loyer ' + ${moisLabel} + ' ' + ${quittance.annee}"></h2>
    </div>

    <!-- Contenu -->
    <div class="content">

        <div class="line">
            Reçu de : <span class="bold"
                            th:text="${locataire.firstName + ' ' + locataire.lastName}"></span>
        </div>

        <div class="line">
            La somme de : <span class="blue"
                                th:text="${quittance.montantTotal} + ' €'"></span>
        </div>

        <div class="line">
            Le : <span th:text="${#temporals.format(quittance.datePaiement, 'dd/MM/yyyy')}"></span>
        </div>

        <div class="line">
            pour loyer et accessoires des locaux sis :
            <span class="bold"
                  th:text="${quittance.bien.adresse + ', ' + quittance.bien.codePostal + ' ' + quittance.bien.ville}"></span>
        </div>

        <div class="line">
            en paiement du terme du
            <span th:text="${#temporals.format(quittance.dateEcheance, 'dd/MM/yyyy')}"></span>
        </div>

        <!-- Détail -->
        <div class="detail">
            <div>Détail :</div>
            <div>- Loyer : <span th:text="${quittance.loyerMensuel} + ' €'"></span></div>
            <div>- Charges : <span th:text="${quittance.chargesMensuelles} + ' €'"></span></div>
            <div class="bold">
                Total : <span th:text="${quittance.montantTotal} + ' €'"></span>
            </div>
        </div>

        <!-- Signature -->
        <div class="signature">
            <div>Fait le <span th:text="${#temporals.format(quittance.createdAt, 'dd/MM/yyyy')}"></span></div>
            <div class="bold"
                 th:text="${proprietaire.firstName + ' ' + proprietaire.lastName}"></div>
        </div>

    </div>

    <!-- Footer -->
    <div class="footer">
        Kupanga — Quittance n°
        <span th:text="${quittance.id}"></span>
    </div>

</div>

</body>
</html>

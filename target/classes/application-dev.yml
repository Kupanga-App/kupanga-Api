spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/kupanga_dev
    username: kupanga
    password: devpassword
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate        # Flyway gère le schéma, Hibernate vérifie seulement
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true   # indispensable si la BD existe déjà
    validate-on-migrate: false  # évite les conflits de checksum avec PostGIS
    default-schema: public

  # ------------------------
  # Redis Cache
  # ------------------------
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  cache:
    type: redis

minio:
  endpoint: http://localhost:9001
  access-key: minioadmin
  secret-key: minioadmin

app:
  url: http://localhost:4200/
  reset-link: http://localhost:4200/auth/reset-password?token=
  url-login: http://localhost:4200/auth/login
  url-mino: http://localhost:9000
  cookie:
    secure: false
    same-site: Lax